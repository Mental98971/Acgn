<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACGN — Anime · Comics · Games · Novels</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070e;--bg2:#0b0b16;--s1:#111122;--s2:#161630;--s3:#1c1c38;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.14);--bdr3:rgba(255,255,255,.24);
  --txt:#eeeaf8;--muted:#6e6e96;--faint:rgba(238,234,248,.11);
  --anime:#ff4d6d;--anime-d:rgba(255,77,109,.13);--anime-g:rgba(255,77,109,.32);
  --manhwa:#ff6b35;--manhwa-d:rgba(255,107,53,.13);
  --manhua:#f59e0b;--manhua-d:rgba(245,158,11,.13);
  --manga:#38bdf8;--manga-d:rgba(56,189,248,.13);
  --comic:#a78bfa;--comic-d:rgba(167,139,250,.13);
  --novel:#34d399;--novel-d:rgba(52,211,153,.13);
  --game:#fbbf24;--game-d:rgba(251,191,36,.13);
  --accent:#8b5cf6;--accent-d:rgba(139,92,246,.13);
  --gold:#fbbf24;--green:#34d399;
  --nav-h:62px;--r:8px;--r-sm:5px;--r-lg:14px;
  --sh:0 4px 32px rgba(0,0,0,.65);--sh-lg:0 16px 60px rgba(0,0,0,.9);
  --ease:cubic-bezier(.23,1,.32,1);--tr:.28s var(--ease);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--txt)}
ul{list-style:none}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.024;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
/* NAV */
#mainNav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:800;background:rgba(7,7,14,.94);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--bdr)}
.nav-inner{max-width:1480px;margin:0 auto;padding:0 2rem;height:100%;display:flex;align-items:center;gap:1.5rem}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.15em;cursor:pointer;flex-shrink:0;display:flex;align-items:baseline;gap:2px;transition:opacity .2s}
.nav-logo:hover{opacity:.85}.nav-logo .dot{color:var(--anime)}
.nav-logo sub{font-size:.48rem;letter-spacing:.3em;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:400;margin-left:4px;vertical-align:middle}
.nav-pills{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}.nav-pills::-webkit-scrollbar{display:none}
.nav-pill{padding:.3rem .85rem;border-radius:20px;font-size:.73rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:var(--tr);white-space:nowrap;border:1px solid transparent}
.nav-pill:hover{color:var(--txt);background:var(--s2)}.nav-pill.active{color:var(--txt);background:var(--s2);border-color:var(--bdr2)}
.nav-pill[data-t="anime"].active{color:var(--anime);border-color:var(--anime-d);background:var(--anime-d)}
.nav-pill[data-t="manhwa"].active{color:var(--manhwa);border-color:var(--manhwa-d);background:var(--manhwa-d)}
.nav-pill[data-t="manhua"].active{color:var(--manhua);border-color:var(--manhua-d);background:var(--manhua-d)}
.nav-pill[data-t="manga"].active{color:var(--manga);border-color:var(--manga-d);background:var(--manga-d)}
.nav-pill[data-t="comic"].active{color:var(--comic);border-color:var(--comic-d);background:var(--comic-d)}
.nav-pill[data-t="novel"].active{color:var(--novel);border-color:var(--novel-d);background:var(--novel-d)}
.nav-pill[data-t="game"].active{color:var(--game);border-color:var(--game-d);background:var(--game-d)}
.nav-right{display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.nav-sb{position:relative}.nav-sb input{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:.42rem .9rem .42rem 2.1rem;color:var(--txt);font-size:.82rem;width:200px;outline:none;transition:var(--tr)}.nav-sb input:focus{border-color:var(--bdr2);width:258px}.nav-sb input::placeholder{color:var(--muted)}.nav-sb .si{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.82rem;color:var(--muted);pointer-events:none}
.nav-btn{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--muted);transition:var(--tr);position:relative;border:1px solid transparent}
.nav-btn:hover{color:var(--txt);background:var(--s2);border-color:var(--bdr)}
.nav-btn .badge{position:absolute;top:3px;right:3px;min-width:14px;height:14px;background:var(--anime);border-radius:7px;border:2px solid var(--bg);font-size:.48rem;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;padding:0 2px}
/* HERO */
.hero{min-height:96vh;display:flex;align-items:flex-end;padding-bottom:5rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg-base{position:absolute;inset:0;background:linear-gradient(160deg,#08071a 0%,#10091f 40%,#070714 80%,var(--bg) 100%)}
.hero-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 10s ease-in-out infinite}
.hero-orb1{width:700px;height:700px;right:-100px;top:-200px;background:radial-gradient(circle,rgba(255,77,109,.1) 0%,transparent 70%);animation-duration:12s}
.hero-orb2{width:500px;height:500px;left:10%;top:20%;background:radial-gradient(circle,rgba(139,92,246,.08) 0%,transparent 70%);animation-delay:-5s;animation-duration:9s}
.hero-orb3{width:400px;height:400px;right:25%;bottom:10%;background:radial-gradient(circle,rgba(251,191,36,.06) 0%,transparent 70%);animation-delay:-3s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-30px,20px) scale(1.05)}66%{transform:translate(20px,-15px) scale(.95)}}
.hero-lines{position:absolute;inset:0;background-image:linear-gradient(var(--bdr) 1px,transparent 1px),linear-gradient(90deg,var(--bdr) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 65% 75% at 75% 45%,black 10%,transparent 75%);opacity:.5}
.hero-content{position:relative;z-index:2;max-width:1480px;margin:0 auto;padding:0 2rem;width:100%;display:grid;grid-template-columns:1fr 480px;gap:5rem;align-items:flex-end}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.6rem;margin-bottom:1.8rem;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);border-radius:20px;padding:.35rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.25em;color:var(--anime);text-transform:uppercase}
.hero-eyebrow::before{content:'▶';font-size:.52rem}
h1.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,10vw,9.5rem);line-height:.88;letter-spacing:.02em;margin-bottom:1.8rem}
h1.hero-title .l1{display:block}h1.hero-title .l2{display:block;color:var(--anime)}h1.hero-title .l3{display:block;-webkit-text-stroke:1.5px var(--faint);color:transparent}
.hero-desc{font-size:1.05rem;color:var(--muted);max-width:520px;margin-bottom:2.5rem;line-height:1.8}
.hero-ctas{display:flex;gap:.9rem;align-items:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:3rem;margin-top:3rem;padding-top:2.5rem;border-top:1px solid var(--bdr)}
.hstat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1}.hstat-lbl{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:.2rem}
.type-showcase{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.type-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:1.2rem;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.type-card::before{content:'';position:absolute;inset:0;opacity:0;transition:var(--tr);background:var(--tc-bg,var(--anime-d))}.type-card:hover{transform:translateY(-4px);border-color:var(--tc-c,var(--anime))}.type-card:hover::before{opacity:1}
.type-card-icon{font-size:1.8rem;margin-bottom:.5rem;position:relative;z-index:1}
.type-card-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;position:relative;z-index:1;color:var(--tc-c,var(--anime))}
.type-card-count{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);position:relative;z-index:1;margin-top:.2rem}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.5rem;font-weight:700;border-radius:var(--r-sm);transition:var(--tr);font-size:.9rem;cursor:pointer;font-family:inherit}
.btn-lg{padding:.85rem 2rem;font-size:.95rem}.btn-sm{padding:.35rem .85rem;font-size:.78rem}.btn-xs{padding:.22rem .6rem;font-size:.7rem}
.btn-primary{background:var(--anime);color:white}.btn-primary:hover{filter:brightness(1.12);transform:translateY(-2px);box-shadow:0 8px 28px var(--anime-g)}
.btn-ghost{background:transparent;border:1px solid var(--bdr2);color:var(--muted)}.btn-ghost:hover{border-color:var(--bdr3);color:var(--txt)}
.btn-danger{background:var(--anime-d);border:1px solid rgba(255,77,109,.3);color:var(--anime)}.btn-danger:hover{background:var(--anime);color:white}
.btn-success{background:var(--novel-d);border:1px solid rgba(52,211,153,.3);color:var(--novel)}.btn-success:hover{background:var(--novel);color:#000}
.btn-accent{background:var(--accent-d);border:1px solid rgba(139,92,246,.3);color:var(--accent)}.btn-accent:hover{background:var(--accent);color:white}
/* MARQUEE */
.marquee-wrap{background:var(--anime);padding:.65rem 0;overflow:hidden;display:flex}
.marquee-track{display:flex;animation:marquee 24s linear infinite;white-space:nowrap}
.marquee-item{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:.28em;padding:0 2.5rem;color:rgba(255,255,255,.88);display:inline-flex;align-items:center;gap:2.5rem}
.marquee-item::after{content:'✦';font-size:.5rem;opacity:.6}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
/* SECTIONS */
.section{padding:4.5rem 0}.section-alt{background:var(--s1);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.container{max-width:1480px;margin:0 auto;padding:0 2rem}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem}
.sec-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.35em;color:var(--anime);text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.sec-tag::before{content:'';display:inline-block;width:16px;height:1px;background:var(--anime)}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.04em;line-height:1}
.see-all{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted);cursor:pointer;background:none;border:none;border-bottom:1px solid rgba(120,120,160,.3);padding-bottom:1px;transition:var(--tr)}.see-all:hover{color:var(--anime);border-color:var(--anime)}
/* SERIES CARDS */
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.1rem}
.grid-auto-lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:var(--tr);position:relative}
.sc:hover{transform:translateY(-6px);border-color:var(--bdr2);box-shadow:var(--sh)}
.sc-cover{aspect-ratio:2/3;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.sc-cover img{width:100%;height:100%;object-fit:cover;transition:transform .5s}.sc:hover .sc-cover img{transform:scale(1.07)}
.sc-cover-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;text-align:center}
.sc-cover-ph .ph-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;color:rgba(255,255,255,.22);line-height:1.2;word-break:break-word}
.sc-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,14,.9) 0%,transparent 55%);pointer-events:none}
.sc-type-tag{position:absolute;top:.5rem;left:.5rem;z-index:3;font-family:'JetBrains Mono',monospace;font-size:.48rem;letter-spacing:.12em;padding:.18rem .45rem;border-radius:3px;text-transform:uppercase;font-weight:700}
.sc-status{position:absolute;top:.5rem;right:.5rem;z-index:3;font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.1em;padding:.18rem .4rem;border-radius:3px;text-transform:uppercase}
.tag-anime{background:var(--anime-d);color:var(--anime);border:1px solid rgba(255,77,109,.25)}
.tag-manhwa{background:var(--manhwa-d);color:var(--manhwa);border:1px solid rgba(255,107,53,.25)}
.tag-manhua{background:var(--manhua-d);color:var(--manhua);border:1px solid rgba(245,158,11,.25)}
.tag-manga{background:var(--manga-d);color:var(--manga);border:1px solid rgba(56,189,248,.25)}
.tag-comic{background:var(--comic-d);color:var(--comic);border:1px solid rgba(167,139,250,.25)}
.tag-novel{background:var(--novel-d);color:var(--novel);border:1px solid rgba(52,211,153,.25)}
.tag-game{background:var(--game-d);color:var(--game);border:1px solid rgba(251,191,36,.25)}
.s-ongoing{background:rgba(52,211,153,.1);color:var(--novel);border:1px solid rgba(52,211,153,.2)}
.s-completed{background:rgba(56,189,248,.1);color:var(--manga);border:1px solid rgba(56,189,248,.2)}
.s-hiatus{background:rgba(245,158,11,.1);color:var(--manhua);border:1px solid rgba(245,158,11,.2)}
.sc-body{padding:.75rem;border-top:1px solid var(--bdr)}
.sc-title{font-weight:800;font-size:.84rem;line-height:1.3;margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-meta{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--muted)}.sc-rating{color:var(--gold);font-weight:700}
/* SPOTLIGHT */
.spotlight{display:grid;grid-template-columns:380px 1fr;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;min-height:460px}
.spotlight-cover{position:relative;overflow:hidden}.spotlight-cover-img{width:100%;height:100%;object-fit:cover;transition:transform .6s}.spotlight:hover .spotlight-cover-img{transform:scale(1.04)}
.spotlight-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:3rem;color:rgba(255,255,255,.12);padding:2rem;text-align:center;line-height:1}
.spotlight-overlay{position:absolute;inset:0;background:linear-gradient(90deg,transparent 50%,var(--s1) 100%)}
.spotlight-body{padding:3rem;display:flex;flex-direction:column;justify-content:center}
.spotlight-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.3em;color:var(--anime);text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:.7rem}
.spotlight-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--anime)}
.spotlight-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.04em;line-height:.95;margin-bottom:1rem}
.spotlight-desc{font-size:.9rem;line-height:1.8;color:var(--muted);max-width:560px;margin-bottom:1.8rem}
.spotlight-stats{display:flex;gap:2rem;margin-bottom:1.8rem;padding:1.2rem 0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.sstat-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold);line-height:1}.sstat-lbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.15rem}
.genre-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.8rem}
.genre-chip{padding:.22rem .65rem;border-radius:3px;border:1px solid var(--bdr);font-size:.72rem;color:var(--muted);font-weight:600}
/* GENRE GRID */
.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem}
.genre-btn{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r-sm);padding:.9rem 1rem;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:.6rem}
.genre-btn:hover{border-color:var(--bdr2);background:var(--s2);transform:translateY(-2px)}
.genre-em{font-size:1.1rem}.genre-nm{font-weight:700;font-size:.82rem}.genre-ct{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);margin-left:auto}
/* FILTERS */
.filter-bar{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem 1.3rem;margin-bottom:1.8rem;display:flex;flex-wrap:wrap;gap:.9rem;align-items:center}
.f-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.f-select{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);padding:.35rem .7rem;border-radius:4px;font-size:.82rem;outline:none;cursor:pointer}
.f-chips{display:flex;gap:.3rem;flex-wrap:wrap}
.f-chip{padding:.22rem .62rem;border:1px solid var(--bdr);border-radius:20px;font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;transition:var(--tr);background:none}
.f-chip:hover{border-color:var(--bdr2);color:var(--txt)}.f-chip.active{border-color:var(--anime);color:var(--anime);background:var(--anime-d)}
.f-divider{width:1px;height:22px;background:var(--bdr);flex-shrink:0}.r-count{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);margin-left:auto}
/* SERIES DETAIL */
.detail-hero{background:var(--s1);border-bottom:1px solid var(--bdr);padding:3.5rem 0 0;position:relative;overflow:hidden}
.detail-bg-blur{position:absolute;inset:0;filter:blur(60px);opacity:.1;z-index:0}
.detail-inner{position:relative;z-index:1;display:grid;grid-template-columns:210px 1fr;gap:3rem;align-items:flex-start}
.detail-cover{width:210px;flex-shrink:0;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-lg)}
.detail-cover img,.detail-cover-ph{width:100%;aspect-ratio:2/3;object-fit:cover}
.detail-cover-ph{display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--faint);padding:1rem;text-align:center}
.detail-breadcrumb{font-size:.8rem;color:var(--muted);margin-bottom:1.2rem;display:flex;align-items:center;gap:.4rem}
.bc-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;transition:var(--tr)}.bc-btn:hover{color:var(--txt)}.bc-sep{opacity:.4}
.detail-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.dtag{padding:.2rem .55rem;border-radius:3px;font-size:.68rem;font-weight:700;border:1px solid var(--bdr);color:var(--muted)}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.03em;line-height:.95;margin-bottom:.8rem}
.detail-meta{display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.82rem;color:var(--muted);margin-bottom:1.2rem}.detail-meta strong{color:var(--txt)}
.detail-desc{font-size:.91rem;line-height:1.82;color:var(--muted);max-width:680px;margin-bottom:1.5rem}
.detail-actions{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-bottom:2rem}
.detail-stats{display:flex;gap:2.5rem;padding:1.2rem 0;border-top:1px solid var(--bdr)}
.ds-num{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1}.ds-lbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.15rem}
.btn-bm{padding:.7rem 1.5rem;border:1px solid var(--bdr2);border-radius:var(--r-sm);font-weight:700;font-size:.86rem;color:var(--muted);transition:var(--tr);background:none}
.btn-bm:hover{border-color:var(--gold);color:var(--gold)}.btn-bm.on{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,.1)}

<script>
'use strict';
/* ── LOCAL STORAGE (text/JSON only, small data) ── */
const S={
  g(k){try{return JSON.parse(localStorage.getItem('acgn_'+k))}catch{return null}},
  s(k,v){try{localStorage.setItem('acgn_'+k,JSON.stringify(v));return true}catch(e){if(e.name==='QuotaExceededError'||e.code===22||e.code===1014){toast('⚠️ Text storage full. Try clearing old data in Settings.','e')}else{toast('Storage error: '+e.message,'e')}return false}},
  d(k){try{localStorage.removeItem('acgn_'+k)}catch{}}
};

/* ── INDEXEDDB (binary: PDFs, videos, media files — unlimited) ── */
const IDB={
  DB:'acgn_files',VER:1,STORE:'files',_db:null,
  open(){
    if(this._db)return Promise.resolve(this._db);
    return new Promise((res,rej)=>{
      const r=indexedDB.open(this.DB,this.VER);
      r.onupgradeneeded=e=>e.target.result.createObjectStore(this.STORE);
      r.onsuccess=e=>{this._db=e.target.result;res(this._db)};
      r.onerror=()=>rej(r.error);
    });
  },
  async get(key){const db=await this.open();return new Promise((res,rej)=>{const r=db.transaction(this.STORE,'readonly').objectStore(this.STORE).get(key);r.onsuccess=()=>res(r.result??null);r.onerror=()=>rej(r.error)})},
  async set(key,val){const db=await this.open();return new Promise((res,rej)=>{const r=db.transaction(this.STORE,'readwrite').objectStore(this.STORE).put(val,key);r.onsuccess=()=>res(true);r.onerror=()=>rej(r.error)})},
  async del(key){const db=await this.open();return new Promise((res,rej)=>{const r=db.transaction(this.STORE,'readwrite').objectStore(this.STORE).delete(key);r.onsuccess=()=>res(true);r.onerror=()=>rej(r.error)})},
  async keys(){const db=await this.open();return new Promise((res,rej)=>{const r=db.transaction(this.STORE,'readonly').objectStore(this.STORE).getAllKeys();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)})},
  async clear(prefix=''){const ks=await this.keys();await Promise.all(ks.filter(k=>!prefix||String(k).startsWith(prefix)).map(k=>this.del(k)))},
  // Store a File/Blob and return the IDB key
  async storeFile(file,prefix='file'){
    const key=prefix+'_'+uid();
    const buf=await file.arrayBuffer();
    await this.set(key,{buf,mime:file.type,name:file.name,size:file.size});
    return key;
  },
  // Get a temporary blob URL from an IDB key (caller should revoke when done)
  async blobUrl(key){
    const d=await this.get(key);
    if(!d)return null;
    if(typeof d==='string'&&d.startsWith('data:')){
      // legacy dataURL stored as string — convert to blob
      const [hd,b64]=d.split(',');const mime=hd.match(/:(.*?);/)[1];
      const bin=atob(b64);const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
      return URL.createObjectURL(new Blob([bytes],{type:mime}));
    }
    if(d&&d.buf)return URL.createObjectURL(new Blob([d.buf],{type:d.mime||'application/octet-stream'}));
    return null;
  },
  // Return a dataURL from key (for persistent src attributes)
  async dataUrl(key){
    const d=await this.get(key);
    if(!d)return null;
    if(typeof d==='string'&&d.startsWith('data:'))return d;
    if(d&&d.buf){
      return new Promise(res=>{
        const reader=new FileReader();
        reader.onload=e=>res(e.target.result);
        reader.readAsDataURL(new Blob([d.buf],{type:d.mime||'application/octet-stream'}));
      });
    }
    return null;
  }
};

/* ── IMAGE COMPRESSOR ── */
const IMG={
  compress(file,maxPx=1200,quality=0.78){
    return new Promise((resolve,reject)=>{
      if(!file.type.startsWith('image/')){reject(new Error('Not an image'));return}
      const reader=new FileReader();
      reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
          let{width:w,height:h}=img;
          if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
          const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
          const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
          const mime=canvas.toDataURL('image/webp').startsWith('data:image/webp')?'image/webp':'image/jpeg';
          resolve(canvas.toDataURL(mime,quality));
        };
        img.onerror=()=>reject(new Error('Failed to load image'));
        img.src=e.target.result;
      };
      reader.onerror=()=>reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  },
  cover(file){return this.compress(file,800,0.80)},
  page(file){return this.compress(file,1400,0.82)},
  thumb(file){return this.compress(file,120,0.65)}, // tiny thumbnail for media grid
};

/* ── MEDIA LIB — metadata in LS, binaries in IDB ── */
const MEDIA={
  allMeta(){return S.g('media')||[]},
  getMeta(id){return this.allMeta().find(m=>m.id===id)||null},
  byType(t){const a=this.allMeta();return t==='all'?a:a.filter(m=>m.mediaType===t)},
  stats(){const a=this.allMeta();return{total:a.length,images:a.filter(m=>m.mediaType==='image').length,videos:a.filter(m=>m.mediaType==='video').length,pdfs:a.filter(m=>m.mediaType==='pdf').length}},
  async add(item){
    const id=uid();
    const meta={id,name:item.name||'file',mediaType:item.mediaType,mimeType:item.mimeType,size:item.size||0,uploadedBy:item.uploadedBy,ts:Date.now()};
    // Images: store compressed dataURL as thumb in meta, full in IDB
    if(item.mediaType==='image'&&item.data){
      meta.thumb=item.thumb||item.data; // small preview
      try{await IDB.set('media_'+id,item.data)}catch(e){toast('IDB error storing image: '+e.message,'e');return null}
    } else if(item.idbKey){
      // Already stored in IDB by caller
      meta.idbKey=item.idbKey;
    } else if(item.data){
      // Non-image binary — store in IDB
      try{await IDB.set('media_'+id,item.data)}catch(e){toast('IDB error: '+e.message,'e');return null}
    }
    const all=this.allMeta();all.unshift(meta);S.s('media',all);return meta;
  },
  async del(id){
    S.s('media',this.allMeta().filter(m=>m.id!==id));
    try{await IDB.del('media_'+id)}catch{}
  },
  async clearAll(){
    S.d('media');
    try{await IDB.clear('media_')}catch{}
  }
};

/* ── CONFIG ── */
const CFG={_mp:'thestarcrossed',ver:'4.0.0'};
const TM={anime:{l:'Anime',e:'📺',c:'var(--anime)',d:'var(--anime-d)',cls:'tag-anime'},manhwa:{l:'Manhwa',e:'🇰🇷',c:'var(--manhwa)',d:'var(--manhwa-d)',cls:'tag-manhwa'},manhua:{l:'Manhua',e:'🇨🇳',c:'var(--manhua)',d:'var(--manhua-d)',cls:'tag-manhua'},manga:{l:'Manga',e:'🇯🇵',c:'var(--manga)',d:'var(--manga-d)',cls:'tag-manga'},comic:{l:'Comic',e:'💥',c:'var(--comic)',d:'var(--comic-d)',cls:'tag-comic'},novel:{l:'Novel',e:'📖',c:'var(--novel)',d:'var(--novel-d)',cls:'tag-novel'},game:{l:'Game',e:'🎮',c:'var(--game)',d:'var(--game-d)',cls:'tag-game'}};
const TYPES=['all','anime','manhwa','manhua','manga','comic','novel','game'];
const GENRES=['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mystery','Romance','Sci-Fi','Slice of Life','Supernatural','Thriller','Cultivation','Isekai','Mecha','Sports','Historical','School','Dark Fantasy','Psychological'];

/* ── UTILS ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmtN(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function fmtD(d){try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d||''}}
function today(){return new Date().toISOString().split('T')[0]}
function ago(ts){if(!ts)return'';const d=(Date.now()-ts)/1e3;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function deb(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
function grad(id){const G=['linear-gradient(135deg,#1a0533,#3a1060)','linear-gradient(135deg,#0a1a2e,#1a3d6e)','linear-gradient(135deg,#2e0a0a,#6e1a1a)','linear-gradient(135deg,#0a2e1a,#1a6e3d)','linear-gradient(135deg,#2e1a0a,#6e3d1a)','linear-gradient(135deg,#1a0a2e,#6e1a4d)','linear-gradient(135deg,#0a1a1a,#1a4d4d)','linear-gradient(135deg,#1a1a0a,#4a4a1a)','linear-gradient(135deg,#2a0a2a,#5a1a5a)'];const s=(id||'x').split('').reduce((a,c)=>a+c.charCodeAt(0),0);return G[s%G.length]}
function chUnit(t){return{anime:'Ep',manhwa:'Ch',manhua:'Ch',manga:'Ch',comic:'#',novel:'Ch',game:'Pt'}[t]||'Ch'}
function chLabel(t){return{anime:'Episodes',manhwa:'Chapters',manhua:'Chapters',manga:'Chapters',comic:'Issues',novel:'Chapters',game:'Guides'}[t]||'Chapters'}

  {id:'tlr001',title:'The Last Ranker',type:'novel',genres:['Fantasy','Action','Isekai'],status:'ongoing',author:'ACGN Original',artist:'—',year:2024,rating:9.3,ratingCount:310000,views:12000000,featured:true,description:'In a world reshaped by interdimensional Gates, Kang Jun-seo is the weakest Hunter alive. When a dungeon trial leaves him clinically dead for eleven seconds, he wakes to a System notification that will change everything.',cover:'',chapters:[
    {id:'tlr-c1',number:1,title:'The Disgrace of the Rankings',type:'text',uploadDate:'2024-03-01',views:1200000,content:`The notification appeared at 7:43 in the morning, which was, Kang Jun-seo thought, a perfectly cruel time for a man's career to implode.

HUNTER ANNUAL REASSESSMENT — RESULTS POSTED.

He'd known it was coming. He'd trained for six months specifically for this, sneaking early-morning sessions into the gym before his shifts at the Association building, eating properly for once, sleeping eight hours. And still, staring at the holographic panel floating above his desk in the Hunter Association's Seoul Branch B filing room, he felt the familiar cold settling into his chest.

CLASS: D
POWER LEVEL: 112
RANK PERCENTILE: 2nd from bottom.

Second from bottom. Not even last. Last would have been almost dignified — a clear endpoint, a floor. Second from bottom meant there was someone worse, which made him feel simultaneously better and immeasurably worse about himself.

"Jun-seo." His supervisor, Park Byung-woo, appeared in the doorway without knocking. "We need to talk."

Jun-seo closed the holographic panel. "I know what you're going to say."

"Then this will be quick." Park sat on the edge of a filing cabinet. "The Association has a policy. D-Ranks below threshold get transferred to civilian support. Administrative work, logistics, nothing dangerous." He paused. "It's a good outcome for someone in your situation."

In your situation. There it was.

Jun-seo had been a Hunter for five years. Five years of Gates and dungeons and training, watching his classmates grow into B-Ranks and A-Ranks while his numbers crawled sideways and sometimes down. His talent level had been assessed as a nine out of a thousand-point scale. The instructors had told him, gently, that some people simply didn't have the gift. That there was honor in support roles.

He had ignored them for five years.

"I want one more dungeon run," he said.

Park stared at him. "Jun-seo —"

"One more. Solo. The E-Rank dungeon in Incheon last week — it's been cleared twice already, residuals only." He met the man's eyes. "I've given five years to this. Let me close it myself."

Park was quiet for a long moment. Then he sighed and stood up. "File the clearance request. I'll approve it. But after this one, let it go. There's no shame in knowing your limits."

Jun-seo nodded. He did not say what he was thinking, which was: I have been living at my limits for five years. I want to find out what's beyond them.

He filed the clearance request at 8:00 AM. By noon he was standing at the entrance to the Incheon coastal dungeon, Gate shimmering blue-silver above the breakwater.

He had no idea that he was about to die.

He also had no idea that dying would be the best thing that ever happened to him.`},
    {id:'tlr-c2',number:2,title:'Death by Eleven Seconds',type:'text',uploadDate:'2024-03-08',views:1050000,content:`The dungeon was beautiful, in the way that places built to kill things often are.

Jun-seo had been in dozens of dungeons — always with teams, always in the rear echelon. This was his first time entering alone, and the first thing he noticed was the silence. No tactical chatter in his earpiece. Just the soft drip of phosphorescent water from the cavern ceiling and the distant sound of something breathing.

The dungeon was rated E-Rank, barely above a training simulation. He found the first Goblins in a side chamber and dispatched them without much difficulty. He moved through three chambers methodically.

Then he found the stairs going down.

He should have turned around. He knew, standing at the top of those stairs and feeling the air change — colder, denser, carrying the particular metallic smell of high-concentration mana — that this was outside his parameters.

Instead, he went down.

The chamber at the bottom was the size of a cathedral. In the center of it, crouching over the bodies of what appeared to be an entire secondary Goblin population, was a Stone Troll. Grade C. Weight approximately four tons. Currently looking directly at him.

Jun-seo had time for exactly one thought — oh, that's a Stone Troll — before it charged.

The next three minutes were the worst of his life. He ran. He used every trick he knew, every piece of terrain. The Troll was patient: methodically cutting off every exit, waiting for the moment when he had nowhere left to go.

That moment arrived when Jun-seo's heel caught on a rock and he went down hard.

He lay there, looking up at the cavern ceiling, and had a single crystalline moment of absolute clarity: this is where it ends. Five years of refusing to accept his limitations, and his limitations had accepted him.

The club came down.

— — —

He was clinically dead for eleven seconds.

When the retrieval team found him — alerted by his emergency beacon — the medic would tell him that his heart had stopped for eleven seconds before resuming on its own. No explanation. Just stopped, then started again.

He woke up on the dungeon floor, the Troll nowhere in sight. And floating in the air above him, in text that glowed with a light that came from nowhere and everywhere:

SYSTEM INITIALIZATION COMPLETE.
WELCOME, HOST.
YOUR TRIAL HAS BEEN ACCEPTED.

Jun-seo stared at it for a very long time.

Then, slowly, he sat up. "...What trial?" he said, to no one.

THE TRIAL OF THE VOID WALKER.
YOU DIED. YOU RETURNED.
YOU HAVE BEEN FOUND WORTHY.

He had approximately ten thousand questions. But before he could ask any of them, the panel expanded — and the world quietly ceased to be the one he'd always known.`},
    {id:'tlr-c3',number:3,title:'System Awakens',type:'text',uploadDate:'2024-03-15',views:980000,content:`The interface was unlike anything in the official Hunter System.

Every registered Hunter had access to the Association's standard panel — a clean, government-issued overlay that tracked mana levels, skill proficiencies, health status. Jun-seo had stared at his version of it for five years, watching his numbers sit stubbornly low.

This was not that.

VOID WALKER SYSTEM v.0.1
HOST: KANG JUN-SEO
TRUE POWER LEVEL: [CALCULATING]
CLASS: UNRANKED (INHERITOR)
AVAILABLE FUNCTIONS:
▸ SHADOW EXTRACTION
▸ SHADOW ARMY
▸ STAT ABSORPTION
▸ [LOCKED — LEVEL REQUIREMENT NOT MET ×14]

He sat with his back against the cavern wall for twenty minutes, reading every line three times. His hands were shaking.

Shadow Extraction. He pressed the function.

SHADOW EXTRACTION allows the host to extract the shadow of a defeated enemy and integrate it into the Shadow Army as a permanent soldier. Extracted shadows retain the combat abilities and physical characteristics of the original entity.

He noticed then that the Stone Troll was dead. He had no memory of killing it. He'd been dead at the time. The system, apparently, had handled that part.

He pointed at the Troll's shadow. "Extract?"

SHADOW EXTRACTION: STONE TROLL / GRADE: C / CONFIRM?

"Yes."

The shadow moved. It pulled away from the Troll's body like a dark reflection separating from its source. It rose, took shape, and stood. A shadow-version of the Stone Troll, eyes glowing violet, looking at Jun-seo with absolute calm readiness.

SHADOW TROLL (C-GRADE) — INTEGRATED
SHADOW ARMY: 1/∞

He opened his basic stat window.

POWER LEVEL: 547

Five hundred and forty-seven. Yesterday it had been 112.

He sat in the dungeon for a very long time after that. Then he stood up. He was still injured. None of that had changed.

But everything else had.

He climbed out of the dungeon at dusk, the Incheon sea going orange-pink around him. For the first time in five years, he had more to think about than just his failures.`}

  {id:'dg001',title:'Digital God',type:'novel',genres:['Sci-Fi','Fantasy','Action'],status:'ongoing',author:'ACGN Original',artist:'—',year:2024,rating:8.7,ratingCount:145000,views:5200000,featured:false,description:'The world\'s top player in REALM ETERNAL logs in for the final server shutdown — and wakes up inside the game as his max-level character, with all his legendary items and game knowledge, in a world that has suddenly become real.',cover:'',chapters:[
    {id:'dg-c1',number:1,title:'Game Over',type:'text',uploadDate:'2024-04-01',views:580000,content:`The countdown read 00:12:44 when Yoo Seung-min logged in for the last time.

He'd been the top-ranked player in REALM ETERNAL for three years — which in practice meant he'd spent something close to fourteen thousand hours in the full-dive interface, a custom-built rig that simulated sensory input at 98.7% biological accuracy. Close enough to real that after a few weeks, you started to miss the virtual food when you were outside.

The game was shutting down. NEXON had announced it a month ago. Six years of his life — friendships atrophied, job offers declined, most of his waking attention living in a body that wasn't technically his. He existed in the real world as a function of necessity.

00:05:00.

He teleported to his favorite spot: the Apex Observatory, at the absolute top of the world's highest mountain, above the cloud layer. He sat on the observatory railing and watched.

00:01:00.

He thought about what came after. Packing up the rig. Getting a real job. Re-learning what it felt like to live with limits.

00:00:10.

The sky began to fracture — glitch lines, servers starting to spin down. He'd expected this. He closed his eyes.

And then something happened that was not in the shutdown protocol.

The fractured sky exploded with light. Not glitch-light — something coherent, directed, as if the sky itself was downloading something. The light hit him like a physical force, and he felt the familiar lurch of full-dive disconnecting —

Except it didn't disconnect.

He opened his eyes. He was still in REALM ETERNAL. His character's hands — his hands now — were solid. Real. He could feel the stone railing with something that was not 98.7% accuracy. It was 100%.

His interface appeared, and in the center of it, a message in a font that looked carved rather than rendered:

THE SERVERS DID NOT SHUT DOWN.
THE WORLD HAS BEEN TRANSFERRED.
THIS IS NO LONGER A GAME.
WELCOME HOME, EREBUS.

Seung-min sat down very hard on the observatory floor and stared at nothing for a while.

Then, with the calm of a person who has spent three years solving problems under pressure, he opened his stat window, checked his inventory, tested his skills, and began to plan.

He had max stats, legendary equipment, and complete knowledge of every dungeon, quest, faction, and political structure in this world.

He was about to find out what any of that was actually worth.`}

  {id:'roe001',title:'Realm of Eternia',type:'game',genres:['Fantasy','Adventure','RPG'],status:'ongoing',author:'ACGN Games',artist:'Eternia Studio',year:2024,rating:9.1,ratingCount:280000,views:8400000,featured:false,description:'The definitive fantasy MMORPG of 2024. 12 classes, 400+ dungeons, dynamic world economy, player-built cities, and a 300+ hour main questline. Official guides hosted on ACGN.',cover:'',chapters:[
    {id:'roe-g1',number:1,title:"Beginner's Complete Guide",type:'text',uploadDate:'2024-05-01',views:920000,content:`Welcome to Realm of Eternia. This guide covers everything you need to get started, survive your first week, and make smart decisions that will pay off for hundreds of hours.

### Choosing Your Class

Realm of Eternia has 12 classes in three archetypes. Your class is permanent — read carefully before choosing.

WARRIOR ARCHETYPE — High durability, melee focus.
- Berserker: Highest single-target damage. Rage mechanic grows stronger as HP drops. High skill ceiling, punishing to beginners.
- Guardian: Definitive tank. Massive health, high defense, party shields. Essential in endgame raids.
- Knight: Balanced melee with support skills. Most forgiving class. Best choice for new players.

MAGE ARCHETYPE — High damage, fragile.
- Pyromancer: Area-of-effect specialist. Clears groups fast, weaker in boss fights.
- Void Mage: Single-target and debuff specialist. Highest damage ceiling, very hard to master.
- Wind Dancer: Mobility mage. Blink skills, crowd control. Best for players who prefer movement.

RANGER ARCHETYPE — Mid-to-long range, agile.
- Shadow Hunter: Stealth, traps, burst damage. Excellent solo choice.
- Beast Tamer: Summons animals. Most unique playstyle. High learning curve.
- Runic Archer: Ranged physical with magic infusion. Consistent, great utility.

RECOMMENDATION: Knight or Runic Archer for new players. Both are forgiving and handle solo early content well.

### Your First Hour

Talk to every NPC with a golden icon — these are Questgivers. Focus on:
1. Complete the Tutorial Chain "A New Dawn" — gives starting gear, 500 Gold, and the rare First Adventurer title.
2. Register at the Adventurer's Guild — unlocks the daily quest board, the most efficient early Gold source.
3. The barrel behind the blacksmith hides a Beginner's Lucky Box. One per account. Grab it immediately.

### Combat Basics

Realm of Eternia uses a three-system combat loop: Stance switching (Offensive / Defensive / Balanced), the Break Gauge, and elemental weaknesses.

Always check an enemy's weakness before entering a dungeon. Hitting a weakness deals 50% bonus damage. The Break Gauge resets enemy actions and creates a burst window when depleted.

### First Dungeon

The Goblin Warrens (available from Level 5) is the first dungeon. Most players can solo-clear it by Level 8. Kill the two drum-Goblins first in the boss room — they continuously buff Chief Gruk if left alive.`},
    {id:'roe-g2',number:2,title:'Combat Deep Dive',type:'text',uploadDate:'2024-05-08',views:780000,content:`Realm of Eternia's combat system is one of the most rewarding in the MMORPG genre. Here is a complete breakdown of every mechanic.

### The Stance System

Switch in real time between three stances:
- Offensive: +25% damage, -15% defense
- Defensive: +25% defense, -15% damage
- Balanced: Default, no bonus or penalty

The optimal approach is dynamic switching: Defensive before a telegraphed attack lands, Offensive during your skill window. Players who master stance timing deal dramatically more effective damage than those who stay in Offensive the whole fight.

### The Break Gauge

Every enemy has a yellow Break Gauge. Deplete it to trigger the Broken state (6–8 seconds of reduced defense, no attacks, your burst window opens).

Break efficiency by attack type: Blunt (100%), Thrust (75%), Slash (50%), Magic (variable by element).

Save your highest-damage skill for the first second of the Broken state, then chain your remaining cooldowns.

### Elemental System

Seven elements: Fire, Water, Wind, Earth, Lightning, Shadow, Holy. Every enemy has a weakness and a resistance. Check before entering — the difference between hitting a weakness and a resistance can be 75% damage variation.

### Status Effects

Burn (fire DoT), Freeze (70% movement reduction — shatter with Blunt for bonus damage), Shock (interrupts skills), Poison (ignores defense), Bleed (scales with STR), Silence (no skills), Stun (2–4 sec no action).

Advanced combinations: Burn + Poison = Toxic Flame (double DoT rate). Shock + Freeze = Crystalline Static (+25% lightning damage on frozen target). These combinations are the foundation of the Alchemist class's identity.

### Dodge Windows

The dodge roll grants 0.4 seconds of invincibility frames at the start of the animation. Many attacks that appear unavoidable can be dodged with exact timing. Learning enemy tells — the 0.3 to 0.8 second animation that precedes an attack — is what separates good players from great ones. Red tells are unavoidable (run from AoE). Orange requires strict timing. Yellow is comfortable.`}

  async handleMediaUpload(inp){
    const files=Array.from(inp.files);if(!files.length)return;
    let done=0;const total=files.length;
    toast('Uploading '+total+' file(s)…','i');
    for(const f of files){
      const mt=f.type.startsWith('image/')?'image':f.type.startsWith('video/')?'video':f.type==='application/pdf'?'pdf':f.type.startsWith('audio/')?'audio':'other';
      try{
        let meta={name:f.name,mediaType:mt,mimeType:f.type,size:f.size,uploadedBy:AUTH.sess()?.username};
        if(mt==='image'){
          // Compress full image for IDB, tiny thumb for metadata display
          const[full,thumb]=await Promise.all([IMG.compress(f,1400,0.85),IMG.thumb(f)]);
          meta.thumb=thumb;meta.data=full;
        }else{
          // Read as dataURL, pass to MEDIA.add which stores in IDB under 'media_<id>'
          await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{meta.data=e.target.result;res()};r.onerror=rej;r.readAsDataURL(f)});
        }
        await MEDIA.add(meta);
        done++;
        if(done===total){toast(total+' file(s) uploaded ✓','s');this.loadPage('media')}
      }catch(e){done++;toast('Error with '+f.name+': '+e.message,'e');if(done===total)this.loadPage('media')}
    }

  // ─ Chapter form ─

    let typeTabs='';
    if(s.type==='anime'){typeTabs=typeTab('episode','📺','Episode')+typeTab('text','📝','Text')+typeTab('video','🎬','Video')+typeTab('pdf','📕','PDF')}
    else if(['manhwa','manhua','manga','comic'].includes(s.type)){typeTabs=typeTab('images','🖼','Images')+typeTab('text','📝','Text')+typeTab('video','🎬','Video')+typeTab('pdf','📕','PDF')}

    </div>
    <!-- VIDEO -->
    <div id="panel_video" style="${ct==='video'?'':'display:none'}">
      <div class="a-form-sec">Video Content</div>
      <div class="fg"><div class="ff full"><label class="ff-label">YouTube / Vimeo / Direct URL</label><input type="text" id="videoUrlInp" name="videoUrl" class="ff-input" value="${esc(ch?.videoUrl||'')}" placeholder="https://www.youtube.com/watch?v=... or https://vimeo.com/..."><div class="ff-hint">Paste a YouTube, Vimeo, or direct .mp4 URL. Embeds automatically.</div></div>
      <div class="ff full"><label class="ff-label">Preview</label><div id="videoPrevBox" style="width:100%;aspect-ratio:16/9;background:var(--s2);border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem">${ch?.videoUrl?`<iframe src="${esc(ytembed(ch.videoUrl))}" allowfullscreen style="width:100%;height:100%;border:none"></iframe>`:'Enter a URL above to preview'}</div></div>
      <div class="ff full"><label class="ff-label">Description</label><textarea name="videoDesc" class="ff-textarea" rows="4" placeholder="Brief description of this video...">${esc(ch?.videoDesc||'')}</textarea></div>
      <div class="ff full"><label class="ff-label">— OR Upload Video File (small files only) —</label><input type="file" accept="video/*" class="ff-input" style="padding:.4rem" onchange="ADM.handleVideoFile(this)"><div class="ff-hint">⚠️ Videos can be large. Recommend using a URL for anything over 20MB.</div><input type="hidden" name="videoData" id="videoDataH" value="${esc(ch?.videoData||'')}"><div id="videoFileStatus" style="${ch?.videoData?.startsWith('idb:')?'margin-top:.4rem':'display:none'}"><div style="background:var(--manga-d);border:1px solid rgba(56,189,248,.3);border-radius:4px;padding:.5rem 1rem;font-size:.8rem;color:var(--manga)">✓ Video stored in browser database.</div></div></div></div>
    </div>
    <!-- PDF -->
    <div id="panel_pdf" style="${ct==='pdf'?'':'display:none'}">
      <div class="a-form-sec">PDF Document</div>
      <div class="fg"><div class="ff full"><label class="ff-label">PDF URL (recommended for large files)</label><input name="pdfUrl" class="ff-input" value="${esc(ch?.pdfUrl||'')}" placeholder="https://example.com/chapter.pdf"></div>
      <div class="ff full"><label class="ff-label">— OR Upload PDF File —</label><input type="file" id="pdfFileInp" accept=".pdf,application/pdf" class="ff-input" style="padding:.4rem"><div class="ff-hint">Max recommended: 15MB. Stored as data URL.</div><input type="hidden" name="pdfData" id="pdfDataHidden" value="${esc(ch?.pdfData||'')}"></div>
      <div class="ff full" id="pdfPrev" style="${(ch?.pdfUrl||(ch?.pdfData&&!ch?.pdfData.startsWith('idb:')))?'':'display:none'}"><label class="ff-label">Preview</label><div class="pdf-frame-wrap" style="height:280px"><iframe src="${esc(ch?.pdfUrl||(ch?.pdfData?.startsWith('idb:')?'':ch?.pdfData)||'')}" style="width:100%;height:100%;border:none"></iframe></div></div><div class="ff full" style="${ch?.pdfData?.startsWith('idb:')?'':'display:none'}"><div style="background:var(--novel-d);border:1px solid rgba(52,211,153,.3);border-radius:4px;padding:.6rem 1rem;font-size:.82rem;color:var(--novel)">✓ PDF file stored in browser database. Preview available when reading.</div></div></div>
    </div>`
  },
  removeImg(i){const ta=document.getElementById('imgUrlsTA');if(!ta)return;const lines=ta.value.split('\n').filter(Boolean);lines.splice(i,1);ta.value=lines.join('\n');toast('Image removed','i')},
  async handleVideoFile(inp){
    const f=inp.files[0];if(!f)return;
    toast('Storing video in browser database…','i');
    try{
      const key=await IDB.storeFile(f,'video');
      const h=document.getElementById('videoDataH');if(h)h.value='idb:'+key;
      toast('Video ready ✓ (stored in browser database)','s');
    }catch(e){toast('Video error: '+e.message,'e')}
  },

          <div onclick="ADM.goto('media')" style="background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;cursor:pointer;text-align:center;transition:var(--tr)" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--bdr)'"><div style="font-size:1.5rem;margin-bottom:.4rem">🗂️</div><div style="font-weight:800;font-size:.82rem">Media Library</div></div>

  pgSeries(){
    let all=DB.all();if(ST.admSearch){const q=ST.admSearch.toLowerCase();all=all.filter(s=>s.title.toLowerCase().includes(q)||s.author.toLowerCase().includes(q))}

  pgEditSeries(id){

    return`<div class="apg-head"><div><div class="apg-title">${s?'Edit Series':'Add New Series'}</div><div class="apg-sub">${s?esc(s.title):'Fill in the details below'}</div></div><div class="apg-actions">${s?`<button class="btn btn-ghost btn-sm" onclick="ADM.goto('seriesChs',{sid:'${s.id}'})">📄 Chapters</button>`:''}<button class="btn btn-ghost btn-sm" onclick="ADM.goto('series')">← Library</button></div></div>
    <div class="a-form"><form id="aSeriesForm" data-mode="${mode}" ${s?`data-id="${s.id}"`:''}>${this.seriesForm(s)}<div class="form-acts"><button type="submit" class="btn btn-primary">✓ ${s?'Save Changes':'Publish Series'}</button><button type="button" class="btn btn-ghost" onclick="ADM.goto('series')">Cancel</button>${s?`<button type="button" class="btn btn-danger btn-sm" style="margin-left:auto" onclick="ADM.delSeries('${s.id}')">Delete Series</button>`:''}</div></form></div>`
  },
  submitSeries(e){
    e.preventDefault();const form=e.target;const fd=new FormData(form);
    const genres=(fd.get('genres')||'').split(',').filter(Boolean);
    const data={title:(fd.get('title')||'').trim(),author:(fd.get('author')||'').trim(),artist:(fd.get('artist')||'').trim(),year:parseInt(fd.get('year'))||new Date().getFullYear(),type:fd.get('type'),status:fd.get('status'),rating:parseFloat(fd.get('rating'))||8.5,ratingCount:parseInt(fd.get('ratingCount'))||0,description:(fd.get('description')||'').trim(),cover:(fd.get('cover')||'').trim(),genres,featured:fd.get('featured')==='1'};
    if(!data.title||!data.author||!data.description){toast('Fill all required fields','e');return}
    if(form.dataset.mode==='add'){const id=uid();DB.add({...data,id,views:0,chapters:[],createdAt:today(),updatedAt:today()});logAct('series_created',`Added: ${data.title}`,AUTH.sess()?.username);toast(`"${data.title}" published!`,'s');this.goto('seriesChs',{sid:id});render()}
    else{DB.update(form.dataset.id,data);logAct('series_updated',`Updated: ${data.title}`,AUTH.sess()?.username);toast('Saved','s');this.goto('editseries',{id:form.dataset.id});render()}
  },

async function readerView(sid,cid){
  const s=DB.get(sid),ch=DB.getCh(sid,cid);
  if(!s||!ch)return`${navHTML()}<div class="page-wrap section container"><div class="empty-state"><div class="empty-icon">📭</div><h3 class="empty-title">Chapter Not Found</h3><button class="btn btn-primary" onclick="navigate('series',{id:'${sid}'})">Back to Series</button></div></div>`;
  DB.incViews(sid,cid);USER.addHist(sid,cid);
  const chs=s.chapters||[];const ci=chs.findIndex(c=>c.id===cid);const prev=chs[ci-1],next=chs[ci+1];const unit=chUnit(s.type);
  const prevId=prev?prev.id:null,nextId=next?next.id:null;
  const topBar=`<div class="reader-topbar"><button class="reader-back" onclick="navigate('series',{id:'${sid}'})">← ${esc(s.title)}</button><div class="reader-title"><div class="reader-series-lbl">${esc(s.title)}</div><div class="reader-ch-lbl">${unit}${ch.number}: ${esc(ch.title)}</div></div><div class="reader-ch-nav"><button class="rnav-btn" ${!prevId?'disabled':''} onclick="${prevId?`navigate('reader',{sid:'${sid}',cid:'${prevId}'})`:''}" >← Prev</button><span class="rnav-info">${ci+1}/${chs.length}</span><button class="rnav-btn" ${!nextId?'disabled':''} onclick="${nextId?`navigate('reader',{sid:'${sid}',cid:'${nextId}'})`:''}" >Next →</button></div></div>`;
  const botBar=`<div class="reader-bottom"><button class="btn btn-ghost btn-sm" onclick="navigate('series',{id:'${sid}'})" style="margin-right:1rem">📚 All Chapters</button>${prevId?`<button class="rnav-btn" onclick="navigate('reader',{sid:'${sid}',cid:'${prevId}'})">← ${unit}${prev.number}</button>`:'<button class="rnav-btn" disabled>← Prev</button>'}<span class="rnav-info" style="color:var(--txt);font-size:.75rem">${unit}${ch.number} of ${chs.length}</span>${nextId?`<button class="rnav-btn" onclick="navigate('reader',{sid:'${sid}',cid:'${nextId}'})">${unit}${next.number} →</button>`:'<button class="rnav-btn" disabled>Next →</button>'}</div>`;
  const ct=ch.type||'images';

  // ── Resolve IDB keys to blob URLs ──
  async function resolveIdb(val){
    if(!val)return null;
    if(typeof val==='string'&&val.startsWith('idb:')){
      return await IDB.blobUrl(val.slice(4));
    }
    return val; // already a URL or dataURL
  }

  if(ct==='video'){
    const videoSrc=await resolveIdb(ch.videoData)||await resolveIdb(ch.videoUrl)||ch.videoUrl;
    const embed=ytembed(videoSrc||'');
    const player=ch.videoData||videoSrc?.startsWith('blob:')?
      `<video controls src="${esc(videoSrc||'')}" style="width:100%;height:100%"></video>`:
      embed?`<iframe src="${esc(embed)}" allowfullscreen style="width:100%;height:100%;border:none"></iframe>`:
      `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">No video provided</div>`;
    return`${navHTML()}<div class="page-wrap">${topBar}<div class="video-viewer"><div class="video-embed-wrap">${player}</div>${ch.videoDesc?`<p style="color:var(--muted);font-size:.92rem;line-height:1.7;margin-top:1rem">${esc(ch.videoDesc)}</p>`:''}</div>${botBar}</div>`;
  }
  if(ct==='pdf'){
    const src=await resolveIdb(ch.pdfData)||ch.pdfUrl||null;
    return`${navHTML()}<div class="page-wrap">${topBar}<div class="pdf-viewer"><div class="pdf-frame-wrap">${src?`<iframe src="${esc(src)}" style="width:100%;height:100%;border:none"></iframe>`:`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.9rem">No PDF provided</div>`}</div></div>${botBar}</div>`;
  }
  if(ct==='text'){
    const paras=(ch.content||'').split('\n\n').filter(Boolean).map(p=>p.startsWith('###')?`<h3>${esc(p.slice(3).trim())}</h3>`:`<p>${esc(p)}</p>`).join('');
    const isg=s.type==='game';
    return`${navHTML()}<div class="page-wrap">${topBar}${isg?`<div class="guide-shell"><div class="guide-text"><div class="novel-ch-num">Part ${ch.number}</div><div class="novel-ch-title">${esc(ch.title)}</div><div class="novel-divider">· · ·</div>${paras}</div></div>`:`<div class="novel-shell"><div class="novel-toolbar"><button class="nf-btn" onclick="ST.fontSize=Math.max(14,ST.fontSize-1);document.querySelector('.novel-text').style.fontSize=ST.fontSize+'px'" title="Smaller">A-</button><button class="nf-btn" onclick="ST.fontSize=Math.min(24,ST.fontSize+1);document.querySelector('.novel-text').style.fontSize=ST.fontSize+'px'" title="Larger">A+</button></div><div class="novel-ch-num">Chapter ${ch.number}</div><div class="novel-ch-title">${esc(ch.title)}</div><div class="novel-divider">· · ·</div><div class="novel-text" style="font-size:${ST.fontSize}px">${paras}</div></div>`}${botBar}</div>`;
  }
  if(ct==='episode'){
    const paras=(ch.summary||'').split('\n\n').filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join('');
    return`${navHTML()}<div class="page-wrap">${topBar}<div class="ep-viewer"><div style="font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.25em;color:var(--anime);text-transform:uppercase;margin-bottom:.5rem">Episode ${ch.number}</div><div class="novel-ch-title" style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.04em;margin-bottom:1.5rem">${esc(ch.title)}</div><div class="ep-synopsis">${paras||'<p style="color:var(--muted)">No summary available.</p>'}</div></div>${botBar}</div>`;
  }
  // images (default)
  const imgs=ch.images||[];
  const pages=imgs.length?imgs.map((url,i)=>`<img src="${esc(url)}" alt="Page ${i+1}" loading="lazy" style="width:100%;display:block;margin:0 auto" onerror="this.style.display='none'">`).join(''):
    Array.from({length:8},(_,i)=>`<div class="comic-ph"><div class="pg-n">0${i+1}</div><div class="pg-l">Page ${i+1} — Upload Images in Admin</div></div>`).join('');
  return`${navHTML()}<div class="page-wrap">${topBar}<div class="comic-scroll">${pages}</div>${botBar}</div>`;
}


function bookmarksView(){
  const bms=USER.bms(),series=bms.map(id=>DB.get(id)).filter(Boolean);
  return`${navHTML()}<div class="page-wrap"><section class="section"><div class="container"><div class="sec-head"><div><div class="sec-tag">Your Collection</div><h1 class="sec-title">My Library</h1></div><span style="color:var(--muted);font-size:.84rem">${series.length} saved</span></div>${series.length?`<div class="grid-auto-lg">${series.map(sCard).join('')}</div>`:`<div class="empty-state"><div class="empty-icon">📚</div><h3 class="empty-title">Library is Empty</h3><p class="empty-desc">Bookmark series while browsing to save them here.</p><button class="btn btn-primary" onclick="navigate('browse')">Explore →</button></div>`}</div></section>${footerHTML()}</div>`
}

function historyView(){
  const hist=USER.hist().slice(0,60);
  const items=hist.map(h=>{const s=DB.get(h.sid),ch=s?DB.getCh(h.sid,h.cid):null;if(!s||!ch)return'';return`<div class="ch-item" onclick="navigate('reader',{sid:'${s.id}',cid:'${ch.id}'})"><div class="cont-thumb" style="width:34px;height:46px;border-radius:3px;overflow:hidden;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';color:rgba(255,255,255,.2);flex-shrink:0">${s.cover?`<img src="${esc(s.cover)}" alt="" style="width:100%;height:100%;object-fit:cover">`:'📖'}</div><div class="ch-info"><div class="ch-t">${esc(s.title)} — ${chUnit(s.type)}${ch.number}: ${esc(ch.title)}</div><div class="ch-d">${ago(h.t)}</div></div><span class="sc-type-tag ${typeBadge(s.type)}" style="position:static">${s.type}</span></div>`}).filter(Boolean).join('');
  return`${navHTML()}<div class="page-wrap"><section class="section"><div class="container"><div class="sec-head"><div><div class="sec-tag">History</div><h1 class="sec-title">Reading History</h1></div>${hist.length?`<button class="see-all" onclick="if(confirm('Clear history?')){S.d('hist');render()}">Clear All</button>`:''}</div>${items||`<div class="empty-state"><div class="empty-icon">🕐</div><h3 class="empty-title">No History Yet</h3><p class="empty-desc">Start reading to see your history here.</p><button class="btn btn-primary" onclick="navigate('browse')">Browse →</button></div>`}</div></section>${footerHTML()}</div>`
}

/* ── ROUTER ── */
function navigate(view,params={}){ST.view=view;ST.params={...params};if(view==='home')window.scrollTo(0,0);render()}
function setType(t){ST.fType=t;navigate('browse')}
async function render(){
  const app=document.getElementById('app');if(!app)return;
  let html='';
  try{
    if(ST.view==='reader'){
      // Show loading state instantly, then resolve async reader
      app.innerHTML=`${navHTML()}<div class="page-wrap" style="padding-top:calc(var(--nav-h)+80px);text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.2em">LOADING CHAPTER…</div>`;
      const fab=document.getElementById('adminFAB');if(fab)fab.classList.toggle('hidden',!AUTH.ok());
      html=await readerView(ST.params.sid,ST.params.cid);
    } else if(ST.view==='home')html=homeView();
    else if(ST.view==='browse')html=browseView();
    else if(ST.view==='series')html=seriesView(ST.params.id);
    else if(ST.view==='bookmarks')html=bookmarksView();
    else if(ST.view==='history')html=historyView();
    else html=homeView();
  }catch(e){html=`<div style="padding:3rem;color:var(--anime);font-family:monospace">Error: ${esc(e.message)}</div>`}
  app.innerHTML=html;
  // Bind nav search
  const ni=document.getElementById('navSI');
  if(ni){ni.oninput=deb(e=>{ST.search=e.target.value;if(ST.search){navigate('browse')}else render()},300);ni.addEventListener('keydown',e=>{if(e.key==='Escape'){ST.search='';ni.value='';render()}})}
  // Show FAB if logged in
  const fab=document.getElementById('adminFAB');if(fab)fab.classList.toggle('hidden',!AUTH.ok());
}

/* ── INIT ── */
window.addEventListener('load',()=>{initDB();render();document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('adminOverlay')?.classList.contains('open'))ADM.close()})});
</script>
</body>
